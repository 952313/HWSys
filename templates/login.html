<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('login_title', '📚 作业管理平台') }} - {{ t('login_btn', '登录') }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-container h1 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .checkbox-group input { width: 16px; height: 16px; }
        .checkbox-group label { font-size: 14px; color: #4a5568; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            background: #667eea;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .flash-messages { margin-bottom: 16px; }
        .flash {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .flash-error {
            background: #fed7d7;
            color: #9b2c2c;
            border-left: 4px solid #fc8181;
        }
        .flash-success {
            background: #c6f6d5;
            color: #276749;
            border-left: 4px solid #48bb78;
        }
        .flash-info {
            background: #bee3f8;
            color: #2a69ac;
            border-left: 4px solid #667eea;
        }
        .footer {
            text-align: center;
            color: #a0aec0;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>{{ t('login_title', '📚 作业管理平台') }}</h1>
        <p class="subtitle">{{ t('login_subtitle', '请登录以访问您的作业') }}</p>

        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; font-size:12px; justify-content:center;">
            <a href="/settings?next=/" style="color:#667eea; text-decoration:none;">⚙️ {{ t('settings') }}</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>{{ t('username_label', '学号 / 工号') }}</label>
                <input type="text" name="username" placeholder="{{ t('username_label', '学号 / 工号') }}" required autofocus>
            </div>
            <div class="form-group">
                <label>{{ t('password_label', '密码') }}</label>
                <input type="password" name="password" placeholder="{{ t('password_label', '密码') }}" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" name="remember_me" id="remember_me">
                <label for="remember_me">{{ t('remember_me') }}{{ t('remember_me_duration') }}</label>
            </div>
            <button type="submit" class="btn">{{ t('login_btn', '登录') }}</button>
        </form>
    </div>
</body>
</html>
